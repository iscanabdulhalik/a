<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calypso Menu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=4">
</head>
<body>

    <!-- Splash Screen -->
    <div id="splash-screen" class="splash-screen">
        <div class="splash-content">
            <h1 class="splash-logo">CALYPSO</h1>
            <div class="splash-subtitle">COFFEE & FOOD</div>
            <div class="loader"></div>
        </div>
    </div>

    <!-- Header Section -->
    <header class="header">
        <div class="header-bg"></div>
        <div class="logo-container">
            <h1 class="logo" id="restaurant-name">CALYPSO</h1>
            <div class="logo-subtitle">M E N U</div>
        </div>
    </header>

    <!-- Categories Grid Container -->
    <main class="categories-grid" id="categories-grid">
        <!-- populated via js -->
    </main>

    <!-- Category Detail Menu Container -->
    <main class="menu-container" id="menu-container" style="display: none;">
        <!-- populated via js -->
    </main>

    <!-- Footer -->
    <footer class="footer reveal">
        <p id="footer-text">AFİYET OLSUN</p>
    </footer>

    <!-- Scripts -->
    <script src="data.js?v=4"></script>
    <script src="script.js?v=4"></script>
</body>
</html>
